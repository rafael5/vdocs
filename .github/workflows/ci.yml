name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Type check
        run: uv run mypy src/

      # The convert stage shells out to pandoc; installing it lets the real-conversion smoke test
      # (tests/integration/stages/test_convert_smoke.py) run here, so a green CI proves the
      # pipeline's convert backend actually works — not just that the code lints + unit-tests pass.
      - name: Install pandoc (for the convert smoke test)
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Test with coverage
        run: uv run pytest --cov --cov-report=term-missing
