# registries/phrases — curated dead phrases (§9.6, DELETE disposition).
#
# Short recurring strings with zero meaning in a GitHub corpus: paper-era residue and
# conversion artifacts. `normalize` deletes whole blocks matching these (case-insensitive) —
# no reference, no canonical copy kept (distinct from `registries/boilerplate`).
#
# Promoted from `discover` candidates (reports/patterns, registry=phrases) by human review.
# Keep this list conservative: only text that is unambiguously meaningless.

phrases:
  - "<!-- -->"                              # Pandoc empty-comment artifact (≈79/CPRS body)
  - "This page intentionally left blank."
  - "This page intentionally left blank"
  - "Continued on next page"
  - "End of document"
  # descriptive filler around the revision history (§6.6) — dead text, no unique fact. Standalone
  # single-sentence blocks are deleted here; table-adjacent variants (incl. trailing sentences) are
  # caught capture-gated by revision_pure's caption strip.
  - "The following table displays the revision history for this document."
  - "The following table displays the revision history for this manual."
  # B1c — the "blank page for two-sided copying" furniture family (the dominant blank-page variant,
  # ~83 docs, that the original list missed). All ≥4 words → exact/begins-with matched (never eats
  # real prose); `_furniture_core` folds the many emphasis/punctuation/blockquote variants
  # (`*(This page included for two-sided copying.)*`, `> \<This page ...\>`, …) onto these cores.
  - "This page included for two-sided copying."
  - "This page left blank for two-sided copying."
  - "This side left blank for two-sided copying."
  - "This page is intentionally left blank."
  - "This page left blank intentionally."
  - "This page left intentionally blank."
