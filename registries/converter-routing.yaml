# registries/converter-routing — which docs to convert with Docling, not Pandoc (ADR-010, §9.6).
#
# Keyed by the bundle identity <app>/<slug> (= safe(app_code)/safe(doc_slug)). The disposition is
# ROUTE — consumed by `convert`, which uses Docling for listed docs and Pandoc for the rest.
#
# Trigger (v1's signal, `discover`'s converter-routing probe): a heavy Word `[[…]](#_Toc…)`
# cross-reference explosion that Pandoc shreds into thousands of bare list markers. Docling
# reconstructs the lists cleanly. Verified on cprsguium: bare markers 3,058 → 0, proper list
# items 332 → 3,230 (xref wraps 5,092 → 0). This is concentrated in ~one doc, not corpus-wide —
# cprsguium alone is ~65% of every bare marker in the corpus — so keep the allowlist tiny.
#
# (v1's allowlist was {cprsguium, constm}; constm = GMRC/constm is not in the current sample.)

docling:
  - CPRS/cprsguium
