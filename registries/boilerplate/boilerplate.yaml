- id: bp-6ef71cf8d9
  label: Although it is unlikely due to care in collecting appro
  key: although it is unlikely due to care in collecting approved requirements, software quality assurance (sqa) review and multiple testing stages (unit testing, component integration testing, user acceptance testing) a back-out decision due to major issues with this patch could occur during site mirror testing, site production testing or after national release to the field. the strategy would depend upon the stage of testing when the decision is made. if during site production testing, unless the patch produces catastrophic problems, the normal vista response would be for a new version of the test patch correcting defects to be produced, retested and upon successfully passing development team testing would be resubmitted to the site for testing. if the defects were not discovered until after national release but during the 30 days support period, a new patch will be entered into the national patch module on forum and go through all the necessary milestone reviews etc. as an emergency patch.
  text: Although it is unlikely due to care in collecting approved requirements, Software Quality Assurance (SQA) review and multiple testing stages (Unit testing, Component Integration Testing, User Acceptance Testing) a back-out decision due to major issues with this patch could occur during site Mirror Testing, Site Production Testing or after National Release to the Field. The strategy would depend upon the stage of testing when the decision is made. If during Site Production Testing, unless the patch produces catastrophic problems, the normal VistA response would be for a new version of the test patch correcting defects to be produced, retested and upon successfully passing development team testing would be resubmitted to the site for testing. If the defects were not discovered until after national release but during the 30 days support period, a new patch will be entered into the National Patch Module on Forum and go through all the necessary milestone reviews etc. as an emergency patch.
  evidence_docs: 23
  status: approved
