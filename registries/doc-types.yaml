doc_type_patterns:
- pattern: Deployment[,\s]+Installation[,\s]+Back.?Out[,\s]+and[,\s]+Rollback
  code: DIBR
  label: Deployment, Installation, Back-Out, and Rollback Guide
- pattern: Deploy.*Install.*(?:Rollback|Back.?Out)
  code: DIBR
  label: Deployment, Installation, Back-Out, and Rollback Guide
- pattern: \bDIBRG?\b|\bDIRB\b|\bDIBORG\b
  code: DIBR
  label: Deployment, Installation, Back-Out, and Rollback Guide
- pattern: Set\s*[Uu]p\s+and\s+Config(?:uration)?\s+Guide
  code: CFG
  label: Setup and Configuration Guide
- pattern: Config(?:uration)?\s+Guide
  code: CFG
  label: Configuration Guide
- pattern: Quick\s+Reference\s+(?:Guide|Card)
  code: QRG
  label: Quick Reference Guide
- pattern: \bbrochure\b
  code: QRG
  label: Quick Reference Guide
- pattern: \bchecklist\b
  code: QRG
  label: Quick Reference Guide
- pattern: Implementation\s+Guide
  code: IG-IMP
  label: Implementation Guide
- pattern: Deployment\s+Guide
  code: IG
  label: Installation Guide
- pattern: Install(?:ation)?\s+(?:and\s+)?(?:Configuration\s+)?Guide
  code: IG
  label: Installation Guide
- pattern: Install(?:ation)?\s+Manual
  code: IG
  label: Installation Guide
- pattern: Install\s+Deploy\s+Guide
  code: IG
  label: Installation Guide
- pattern: Install\s*/\s*Implement\s+Guide
  code: IG
  label: Installation Guide
- pattern: \bAction\s+Item\b
  code: IG
  label: Installation Guide
- pattern: \bsetup\s+notes?\b|\bset.up\s+notes?\b
  code: IG
  label: Installation Guide
- pattern: User\s+Manual
  code: UM
  label: User Manual
- pattern: User.?s?\s+Guide
  code: UG
  label: User Guide
- pattern: (?:Manager|Supervisor|ADPAC)\s+(?:Manual|Guide)
  code: UG
  label: Manager/ADPAC Guide
- pattern: (?:Site\s+)?Manager.*Manual\b
  code: UG
  label: Manager/ADPAC Guide
- pattern: Administrator.?s?\s+Guide
  code: AG
  label: Administrator's Guide
- pattern: System.?s?\s+Management
  code: SM
  label: Site Manual / Systems Management Guide
- pattern: Clinical\s+Coordinator\s+Manual
  code: UM
  label: Clinical Coordinator Manual
- pattern: \bHandbook\b
  code: UG
  label: User Guide
- pattern: \bMenu\b
  code: UM
  label: User Manual
- pattern: Technical\s+Manual
  code: TM
  label: Technical Manual
- pattern: Technical\s+Guide
  code: TG
  label: Technical Guide
- pattern: API\s+Manual
  code: API
  label: API Manual
- pattern: Programmer\s+Manual
  code: API
  label: API Manual
- pattern: Developer.*Manual
  code: API
  label: API Manual
- pattern: Developer.?s?\s+Guide
  code: DG
  label: Developer Guide
- pattern: (?:HL7\s+)?Interface\s+(?:Document|Specification|Spec)
  code: INT
  label: Interface Specification
- pattern: Interface\s+Toolkit
  code: REF
  label: Interface Toolkit
- pattern: Feed\s+Guide
  code: INT
  label: Interface Feed Guide
- pattern: Security\s+Guide
  code: SG
  label: Security Guide
- pattern: Security\s+Manual
  code: SG
  label: Security Guide
- pattern: Productions?\s+Operations?\s+Manual
  code: POM
  label: Production Operations Manual
- pattern: Operations?\s+Manual\b
  code: POM
  label: Production Operations Manual
- pattern: \bPOM\b
  code: POM
  label: Production Operations Manual
- pattern: Setup\s+Guide
  code: SG-SET
  label: Setup Guide
- pattern: Troubleshooting\s+Guide
  code: SUP
  label: Supplement
- pattern: Release\s+Notes?\b
  code: RN
  label: Release Notes
- pattern: Patch\s+Description
  code: PDD
  label: Patch Description Document
- pattern: Version\s+Description\s+Document
  code: VDD
  label: Version Description Document
- pattern: Description\s+Document
  code: DESC
  label: Description Document
- pattern: Clinical\s+Reminder\s+Update
  code: CRU
  label: Clinical Reminder Update
- pattern: Conversion\s+Guide
  code: CVG
  label: Conversion Guide
- pattern: Frequently\s+Asked\s+Questions
  code: FAQ
  label: Frequently Asked Questions
- pattern: \bAppendix\b
  code: APX
  label: Appendix
- pattern: Training\s+Guide
  code: TRG
  label: Training Guide
- pattern: Training\s+Manual
  code: TRG
  label: Training Manual
- pattern: (?:Quick\s+)?Reference\s+(?:Card|Guide|Manual)
  code: REF
  label: Reference
- pattern: (?:Information\s+)?Flowchart
  code: REF
  label: Reference
- pattern: '^\d{3}:'
  code: SUP
  label: Supplement
- pattern: ^\d{2}[–\-]\d+
  code: FORM
  label: VBA Form
- pattern: ^(?:VA|VBA|SF)\d
  code: FORM
  label: VBA Form
- pattern: (?:Application|Form)\s+\d{2}-\d+
  code: FORM
  label: VBA Form
