# data/doc_labels.yaml
#
# Authoritative doc_code → canonical doc_label table.
#
# Source: bootstrapped from the most-frequent doc_label per doc_code in
# vdl_inventory_enriched.csv, with the 5 drift cases (CFG, INT, REF, UG, UM)
# resolved per assessment §3.5.
#
# When a row's existing doc_label diverges from the canonical entry here, the
# original wording is preserved per-row in `doc_subtitle` so docs like
# "Manager/ADPAC Guide" don't lose that subtitle text.
#
# Drives remediation §4 (assessment issue 3.5).

labels:
