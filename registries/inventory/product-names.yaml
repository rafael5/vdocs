# product-names.yaml — canonical product/module names for multi-product apps.
#
# A VistA namespace (app_code) often hosts several distinctly-named products; the
# `application` facet alone (app_code → app_name) can't tell them apart. This
# registry names each product so the faceted browser can show the dense `abbr`
# and the explainer bar can expand it to `full`. `match` lists the title-leading
# aliases that map a document to a product (longest/most-specific match wins;
# order within an app is specific-first, generic core last).
#
# Every app is listed: the hand-curated multi-product namespaces first, then a
# Phase-2b sweep of single-product apps (abbr from the app_name's parenthetical
# where present, else the app_code; match keeps the distinguishing suffix).
# Curated 2026-06-10 from the Phase-1 mining (docs/product-*.draft.yaml); edit
# freely (tenet #13) — change an entry and `vdocs run --only index --force`.

