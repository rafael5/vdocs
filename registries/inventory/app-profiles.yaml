  AR/WS:
    name: 'Pharmacy: Automatic Replenish / Ward Stock'
    purpose: The Automatic Replenishment/Ward Stock (AR/WS) package provides a method to track drug distribution
      and inventory management within a medical center.
    purpose_long: The Automatic Replenishment/Ward Stock (AR/WS) package provides a method to track drug
      distribution and inventory management within a medical center. The AR/WS module is designed to allow
      each medical center to adapt the system to its own needs.
    function_category: Patient Care Services
    business_owner: ​Pharmacy Benefits Management (PBM)
    app_user_primary: clinical
    app_user_basis: 'SPM product line: Patient Care Services'
    software_class: I
    software_class_basis: VDL national catalog membership (nationally released)
    vasi_status: Production
    features:
    - Provides inventory management capabilities for clinical care locations and drug crash carts.
    - Allows easy drug item inactivation for inventory locations
    - Provides tools to develop medication storage areas with lists of drugs to be maintained in that
      area Drugs are classified by inventory type and assigned storage location and stock level
    - Groups medication storage areas together by inventory group name. Grouping may be by location, date
      (time or frequency of inventory), or inventory type
    - 'Provides tools to conduct inventory: prints inventory sheets and/or pick lists to determine stock
      to be replenished in medication storage areas and, by a selected method, replaces needed inventory
      items'
    - Maintains backorder totals if a physical inventory is conducted and entered into the AR/WS software
    - Provides inventory management reporting capabilities for clinical care locations and drug crash
      carts
    - Provides ability to select by inventory group on all reports
    - Supplies a report to fill on-demand requests for out-of-stock items or items not part of the standard
      inventory
    - Provides various printouts as well as several management statistical reports for the creation and
      maintenance of the system
    namespace: PSGW
    source: monograph
    reviewed: false
    evidence:
      doc: vista_monograph_0723_r
      line: 6386
      match: appid
    confidence: high
  ASU:
    name: 'CPRS: Authorization Subscription Utility'
    purpose: ​The Authorization/Subscription Utility (ASU) provides a method for identifying who is authorized
      to perform various actions on clinical documents. These actions include signing, co-signing, and
      amending.
    purpose_long: ​The Authorization/Subscription Utility (ASU) implements a User Class Hierarchy which
      is useful for identifying the roles that different users fulfill with the VA hospitals and Community
      Based Outpatient Clinics (CBOC's). ASU provides a method for identifying who is AUTHORIZED to sign,
      co-sign, or amend etc. patient documents within VistA. ASU originated in response to a long-recognized
      demand for a means of implementing the "Scope of Practice" model, but the driving force behind its
      development was the complexity of Text Integration Utilities' (TIUs) document definition needs.
      Current security key capabilities were unable to efficiently manage the needs of clinical documentation
      (Discharge Summaries, Progress Notes, Operation Reports, etc.).
    function_category: Clinical Services
    business_owner: ​VHA Office of Health Informatics
    app_user_primary: clinical
    app_user_basis: 'SPM product line: Clinical Services'
    software_class: I
    software_class_basis: VDL national catalog membership (nationally released)
    vasi_status: Production
    features:
    - Defines, populates, and retrieves information about user classes. User classes can be defined hospital-wide
      or more narrowly for a specific service and can be used across VistA to replace and/or complement
      keys
    - Allows linkage of user classes with Document Definitions and document events
    - Allows sites to maintain membership of users in User Classes and to distribute such maintenance
      tasks
    - Membership in classes may be schedule for automatic transition to other classes
    - Lists class members as active or inactive
    - Allows infinite hierarchies of subclasses
    namespace: USR
    source: monograph
    reviewed: false
    evidence:
      doc: vista_monograph_0723_r
      line: 1808
      match: appid
    confidence: high
