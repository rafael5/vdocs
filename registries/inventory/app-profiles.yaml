  XU:
    name: Kernel
    purpose: ​Kernel provides a portability layer between the underlying operating system and application
      code.
    purpose_long: 'Kernel provides a portability layer between the underlying operating system and application
      code. This results in the entire Veterans Health Information Systems and Technology Architecture
      (VistA) system being portable among different computers, operating systems, and M implementations.
      This, together with the database portability provided by VA FileMan, eliminates the cost of application
      conversions each time VHA changes its computing platforms. Kernel also offers shared services for
      VistA applications, resulting in reduced development costs and a common user interface, and provides
      system management tools for managing VistA computer systems. Integrated Single Sign-on: The RPC
      Broker supports a single sign-on point from a client workstation to the server. Users need only
      sign on once when accessing multiple VistA applications on the same workstation.'
    function_category: Health Informatics
    business_owner: ​VHA
    app_user_primary: sysadmin
    app_user_basis: system/user/menu/TaskMan mgmt; developer APIs 2nd
    software_class: I
    software_class_basis: VDL national catalog membership (nationally released)
    vasi_status: Production
    features:
    - 'ZOSF/ZOSV Operating System Interface: The core of Kernel’s portability layer. Insulates applications
      from being tied to any hardware platform, operating system, or M implementation'
    - 'Sign-on and Security Management: Controls user access by device, time, and day of week; controls
      user access to programs, menus, files, fields, and devices; audits by user, device, program, file,
      and field; and provides electronic signature capability'
    - 'Menu Manager: Manages all application menus to provide a standard user environment; customizes
      menus for individual users; shares or restricts menus to a user or a set of users; provides secure
      delegation of menu management authority; and delivers priority system alerts'
    - 'Error Processing: Provides a consistent method for recording and processing application errors'
    - 'Device Handler: Defines generic terminal types to reuse for similar peripherals; supports host
      files in layered operating system environments; insulates programmers from device- and operating
      system-specific coding; and provides standard user device selection across different environments'
    - 'Task Manager: Provides flexible background job scheduling; allows users to control their own tasks;
      and permits specification of device, priority, and time of execution'
    - 'Kernel Installation and Distribution System (KIDS, namespace XPD): Provides a mechanism to create
      a distribution of packages and patches; allows distribution via a Mailman message or a host file;
      and allows queuing the installation of a distribution for off- hours'
    - 'Library Functions: Provides Date, String, Mathematical, Hyperbolic Trigonometric Measurement and
      Utility functions'
    - 'Domain Name Resolution: Provides an Application Program Interface (API) to resolve domain names
      into an Internet Protocol (IP) address'
    - 'Kernel Delphi Components (KDC): Provides developers with the capability to develop VistA client/server
      software. These Delphi-based components enable client applications to communicate and exchange Kernel-related
      data with VistA M Servers (e.g., alerts and date/time)'
