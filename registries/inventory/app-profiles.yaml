  ONC:
    name: 'Registry: Oncology'
    purpose: OncoTraX Cancer Registry is an integrated collection of computer programs and routines, which
      work together in assisting the Cancer Registrars to create and maintain a cancer patient database.
      The software creates case listings and registry reports for Cancer Boards (Cancer Conferences),
      special studies, and the Annual Report recommended by the American College of Surgeons (ACoS).
    purpose_long: The Veterans Administration Central Cancer Registry (VACCR) receives and stores information
      on cancer diagnosis and treatment constraints compiled and sent in by the local cancer registry
      staff at each of the Veterans Affairs Medical Centers that diagnose and/or treat Veterans with cancer.
      The information sent is encoded to meet the site-specific requirements for registry inclusion as
      established by several oversight bodies, including the North American Association of Central Cancer
      Registries, the American College of Surgeons' Commission on Cancer, and the American Joint Commission
      on Cancer, among others. The information is obtained from a wide variety of medical record documents
