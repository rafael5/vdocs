  DRM+:
    name: Dentistry
    purpose: ​The original Dental Record Manager (DRM) software, installed in all VA dental clinics by
      the end of FY 2001, provided a customized user-friendly Windows interface for entering clinical
      encounter information and assisted with the assessment of ongoing care using current patient data
      for completed procedures.
    purpose_long: ​DRM Plus, formerly known as VistA-DRM, brings significant GUI entry and display enhancements
      to the original DRM version. DRM Plus provides data input into the VistA Dental files, as well as
      the Patient Care Encounter (PCE), Text Integration Utility (TIU) and Clinical Patient Record System
      (CPRS) Problem List packages. DRM Plus records diagnostic findings, including head and neck lesions,
      restorative and periodontal charting, and sequenced treatment planning. DRM Plus helps assure quality
      care, patient safety, and staff communication in an environment that is fully integrated with the
      VA electronic health record. The DRM Plus replaced the Dental Activity System (DAS) national and
      local reporting structure with the new Dental Encounter System (DES). With the install of DRM Plus,
      numerous DAS options within VistA were placed out of order.
    function_category: Clinical Services
    business_owner: ​Veterans Health Administration - Dental
    app_user_primary: clinical
    app_user_basis: 'SPM product line: Clinical Services'
    software_class: I
    software_class_basis: VDL national catalog membership (nationally released)
    vasi_status: Production
    features:
    - 'Chart/Treatment: This replaces the DRM Encounter Note tab and features the Treatment & Exam and
      the Periodontal Chart views. Features include head & neck findings, advanced graphics & sequencing'
    - 'Treatment & Exam: This screen is used to record and display oral and maxillofacial diagnostic examination
      findings, including restorative findings. Certain diagnoses, such as implants, impacted teeth, retained
      roots and teeth flagged for observation, appear graphically on all screens'
    - 'Periodontal Chart: This screen records and measures various types of periodontal conditions. Periodontal
      charting icons are condition-specific, allowing a graphic charting display as well as the identification
      of critical elements in periodontal report tables. -Critical elements charted include pocket depth,
      bleeding, delayed bleeding, FGM, MGJ, suppuration, mobility, and furcation involvement. Treatment
      Plan: This screen allows the provider to enter and sequence a plan of care. Color is used to differentiate
      the status of various conditions. Some items appear graphically on all screens'
    - 'Completed Care: This screen is used to enter procedures completed during the current visit. Certain
      completed care procedures, entered from Completed Care Screen, appear graphically on all screens'
    - Clinical Benefits
    - Improves communication among treating dental providers for patient oral and maxillofacial findings
      and for plan of care, including sequencing
    - Easily captures oral and maxillofacial diagnostic findings in a graphical and transaction-oriented
      format
    - Offers the provider the flexibility to enter only completed procedures or to enter the full range
      of findings, planned care, and completed procedures for each patient
    - Provides tracking of head and neck lesions entered by multiple dental providers
    - Captures periodontal findings in a graphical charting display that includes reports
    - Provides a dynamic interface for multiple dental providers to sequence the patient plan of care
    - Offers a visual display of most transactions, including implants and prostheses
    - Offers additional administrative and management tools for tracking workload and individual patient
      treatment plans
    - Provides for integration of medical CPT codes into the software
    - Interfaces with the new Dental Encounter System (DES) local and national database
    - Provides a dental history file including all completed procedures for each patient. Integrates dental
      information within the VA EHR environment with a user-friendly graphical user interface (GUI)
    namespace: DENT
    source: monograph
    reviewed: false
    evidence:
      doc: vista_monograph_0723_r
      line: 1970
      match: appid
    confidence: high
  DVBA:
    name: Automated Medical Information Exchange (AMIE)
    purpose: ​The Automated Medical Information Exchange (AMIE) module facilitates the electronic interchange
