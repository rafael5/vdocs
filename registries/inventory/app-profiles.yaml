      of information relating to admissions and discharges from VA inpatient facilities of active-duty
      personnel. There is a weekly collection process of admissions and discharges for active-duty service
      members at each VA inpatient facility. This collection and consolidation of data into a single repository
      is reviewed and transmitted to DFAS to a central data collection point. Each facility runs the weekly
      background job which collects data based on admissions and discharges for patients with a Primary
      or Other Eligibility of TRICARE, SHARING AGREEMENT or OTHER FEDERAL AGENCY. Upon completion of the
      background job, VistA will send an email message to the local WII ADT REVIEWER mail group alerting
      facility staff on whether there are entries requiring approval. The message indicates either potential
      or no potential active-duty admissions/discharges for the past week. If there were potential admissions
      & discharges, the message will state there are active-duty admissions, reflect the number of potential
      active-duty admissions or discharges needing review, the record count, and the time period of the
      report. Staff will review and process those potential active-duty cases.
