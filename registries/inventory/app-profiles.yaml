  ADT:
    name: Admission Discharge Transfer
    purpose: The Admission, Discharge, Transfer (ADT) module provides a comprehensive range of software
      dedicated to the support of administrative functions related to patient admission, discharge, transfer,
      and registration. The functions of this package apply throughout a patient's inpatient and/or outpatient
      stay, from registration, eligibility determination and Means Testing through discharge with on-line
      transmission of Patient Treatment File (PTF) data to the Austin Information Technology Center (AITC).
    purpose_long: 'The ADT software also aids in recovery of cost of care by supplying comprehensive PTF
      and Means Test software. The ADT module functions as the focal collection point of patient information,
      encompassing demographic, employment, insurance, and medical history data. Many other modules, such
      as Laboratory, Pharmacy, Radiology, Nursing, and Dietetics, utilize information gathered through
      the various ADT options. Several features have been designed to maximize efficiency and maintain
      control over user access of specified sensitive patient records. The Patient Sensitivity function
      allows a level of security to be assigned to certain records within the database (i.e., records
      of employees, government officials, etc.) to maintain control over unauthorized user access. The
      Patient Lookup function screens user access of these records. It also provides for efficient and
      faster retrieval of patient records and identified potential duplicate patient entries. The ADT
      module allows for efficient and accurate collection, maintenance, and output of patient data, thus
      enhancing a health care facility’s ability to provide quality care to its patients. The functions
      within ADT currently fall into five major categories: Application Processing (registration), Bed
      Control (inpatient movements), Inpatient Care Grouping (DRG), Data Transmission to National Database
      (PTF), Supervisor Functions (system setup and maintenance), and Local/National Management Reporting.'
    function_category: Health Informatics
    business_owner: Office of Performance Improvement and Reporting and the Health Information Management
      Council
    app_user_primary: clinical-admin
    app_user_basis: registration/MAS clerks (administrative ADT functions)
    software_class: I
    software_class_basis: VDL national catalog membership (nationally released)
    vasi_status: Production
    features:
    - Provides on-line patient registration and disposition of applications for medical care
    - Tracks patient movements during inpatient stays
    - Provides up-to-date on-line patient information
    - Generates numerous managerial and statistical reports
    - Performs patient data consistency checks
    - Supports the flagging and monitoring of patient/missing patient records deemed to be sensitive
    - Enrolls patients in the VA Patient Enrollment System during the registration process
    - Uses industry standard International Classification of Diseases (ICD)/Current Procedural Terminology
      (CPT) codes
    - Aids in cost recovery of care by supplying comprehensive PTF, Means Test & pharmacy co-pay software
    - Allows support for newborn claims
    - Assignment of a patient to Veteran Transportation Services in VistA scheduling service
    - Veterans Health Identification Card (VHIC)
    - Elimination of the annual financial means test
    - ICD-10 code compliant
    - Fugitive Felon Program Public Law 107-103 section 505 compliant, which prohibits federal agencies
      from providing certain benefits to persons who are fugitive felons
    - Military Sexual Trauma (MST) compliant with the VHA Directive in providing appropriate care and
      counseling to veterans determined to have been a victim of sexual trauma while the veteran was serving
      on active duty
    namespace: DG
    source: monograph
    reviewed: true
    evidence:
      doc: vista_monograph_0723_r
      line: 576
      match: appid
    confidence: high
