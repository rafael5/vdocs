  ACKQ:
    name: Quality Audiology and Speech Analysis and Reporting (QUASAR)
    purpose: Quality Audiology and Speech Analysis and Reporting (QUASAR) is a VistA software package
      written for the Audiology and Speech Pathology Service.  QUASAR is used to enter, edit, and retrieve
      data for each episode of care.
    purpose_long: ''
    function_category: Patient Care Services
    business_owner: ​Audiology and Speech Pathology
    app_user_primary: clinical
    app_user_basis: 'SPM product line: Patient Care Services'
    software_class: I
    software_class_basis: VDL national catalog membership (nationally released)
