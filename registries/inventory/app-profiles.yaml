      (TIU), CPRS, Patient Care Encounter (PCE), and VistA Imaging packages. In conjunction with CPRS,
      CP also provides a method for clinicians to document findings and to complete final procedure reports
      via existing pathways in appropriate VistA applications. The CP functionality is not available in
      the List Manager (LM) version of CPRS. CP provides features that can be used across clinical specialties
