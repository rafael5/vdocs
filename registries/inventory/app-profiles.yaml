    purpose_long: 'AMIE provides a comprehensive and accurate audit trail to track most requests for info.
      AMIE consists of 2 components: Facility administrative options (7131/7132) and VBA Regional Office
      options (2507 Compensation & Pension). Each area has individual items to maintain daily, & reports
      to print. RO staff access VA medical facility computers through VA national telecommunications network
      and exercise their options on each local medical facility’s system as necessary.'
    function_category: Compensation and Pension
    business_owner: ​VHA Office of Disability and OIT Medical Assessment and VBA Compensation
    app_user_primary: business-admin
    app_user_basis: 'SPM product line: Compensation and Pension'
