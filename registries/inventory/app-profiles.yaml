  EC:
    name: Event Capture System (ECS)
    purpose: ​The Event Capture System (ECS) provides a mechanism to track and account for procedures
      and delivered services that are not handled in any other VistA package. The procedures and services
      tracked through Event Capture are associated with (1) the patient to whom they were delivered, (2)
      the provider requesting the service or procedure and (3) the Decision Support System (DSS) Unit
      responsible for delivering the service.
    purpose_long: '​The Event Capture software provides a mechanism to track and account for procedures
      & delivered services other Veterans Health Information Systems and Technology Architecture (VistA)
      packages do not handle. The procedures and services tracked through Event Capture are associated
      with the following:'
    function_category: VHA Finance
    business_owner: Managerial Cost Accounting Office (MCAO)
    app_user_primary: business-admin
    app_user_basis: 'SPM product line: VHA Finance'
    software_class: I
    software_class_basis: VDL national catalog membership (nationally released)
    vasi_status: Production
    features:
    - The patient to whom they were delivered
    - The provider requesting the service or procedure
    - The Decision Support System (DSS) Unit responsible for delivering the service
    - An entire service
    - A section of a service
    - A small section within a section
    - A medical equipment item used in patient procedures
    - When creating or editing DSS Units, users choose what (if any) data is sent to Patient Care Encounter
      (PCE). The advantage of using Event Capture to send data to PCE is that it eliminates the duplicate
      effort of entering the same workload data in the Scheduling software, then transmitting to PCE
    - Allows each VAMC to utilize the software for its own resource/costing needs
    - Implements DSS Units
