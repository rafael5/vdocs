  HL7:
    name: HL7 (VistA Messaging)
    purpose: Health Level Seven (HL7) is an American National Standards Institute (ANSI) standard messaging
      protocol that specifies the set of transactions and encoding rules for electronic data exchange
      between health care computer systems.
    purpose_long: The first released version of VistA HL7 was 1.5, which supported simple point-to-point
      HL7 transactions between VistA and a local commercial off-the-shelf (COTS) system using Hybrid Lower
      Layer Protocol (HLLP), and to other VA facilities using VA MailMan. The initial release of version
      1.6 added the ability to "broadcast" a message to multiple recipients and provide support for the
      X3.28 LLP. A continuing increased demand for additional messaging services was addressed through
      enhancements to HL 1.6, released through patches, which included more complex message routing (dynamic
      addressing), and messaging using Minimal Lower Layer Protocol (MLLP) over Transmission Control Protocol
      (TCP).
