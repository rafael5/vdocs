  DGBT:
    name: Beneficiary Travel
    purpose: ​The Beneficiary Travel module provides the ability to perform the functions involved in
      issuing beneficiary travel pay. Travel reimbursement is provided to specified categories of eligible
      veterans. It is also provided to non-employee attendants who are eligible for such reimbursement.
      These attendants will be issued travel pay under the veteran's name.
    purpose_long: The Beneficiary Travel options provide the ability to perform the functions involved
      in issuing beneficiary travel pay. Travel reimbursement is provided to specified categories of eligible
      veterans. Issuance of travel pay to the veterans in some of these categories is subject to a deductible
      per visit and per month. The deduction requirement may be waived for any veteran who meets specific
      criteria subject to the approval of the local medical center director or designee. Some of the categories
      have income limitations. An income certification form is completed and signed yearly by the veteran. Cash
      reimbursement is paid on VAF 70-3542d, Voucher for Cash Reimbursement of Beneficiary Travel Expenses.
      Non-employee attendants who are eligible for travel reimbursement will be issued travel pay under
      the veteran's name in the computer. Payment for travel by special mode (ambulance, hired car, handicapped
      van, etc.) may be authorized under certain conditions. The amount payable is computed from factors
      such as account type, parameter set up of deductible amount per visit and per month, one-way or
      round-trip mileage, and applied costs. The amount payable for claims with an account type of C&P
      will also be computed by the system.
    function_category: VHA Front Office
    business_owner: ​ Veterans Transportation Program
    app_user_primary: clinical-admin
    app_user_basis: 'SPM product line: VHA Front Office'
    software_class: I
    software_class_basis: VDL national catalog membership (nationally released)
    vasi_status: Production
    features:
    - Automatically computes amount payable for claims with account type of Compensation and Pension
    - Allows each site to define and edit site-specific beneficiary travel parameters
    - Produces a variety of statistical reports for a specified date range
    - Provides ability to reprint the standard pre-formatted beneficiary travel form for cash reimbursement
    namespace: DGBT
    source: monograph
    reviewed: false
    evidence:
      doc: vista_monograph_0723_r
      line: 960
      match: appid
    confidence: high
  DGJ:
    name: Incomplete Records Tracking (IRT)
    purpose: ​The Incomplete Records Tracking (IRT) package provides the medical center the ability to
      monitor incomplete records. Interim summaries, discharge summaries, and both inpatient and outpatient
      operation reports are tracked. Records may be incomplete or deficient for one or more of the following
      reasons - not dictated, not transcribed, not signed, or not reviewed.
    purpose_long: A list of the deficiencies each site will track is distributed with the software. These
      deficiency names and categories are highlighted on the screen display and are not editable. Sites
      may add new deficiencies. Deficiencies that are entered by the site are not highlighted on the screen
      display and can be edited.
    function_category: Health Informatics
    business_owner: ​Not Applicable
    app_user_primary: clinical-admin
    app_user_basis: HIM incomplete-records tracking
    software_class: I
    software_class_basis: VDL national catalog membership (nationally released)
    vasi_status: Not A System
    features:
    - Provides the ability to enter a new or edit an existing incomplete record in the IRT tracking system,
      edit a completed IRT record, and delete an IRT entry
    - Allows each site to establish and edit site-specific IRT parameters
    - Produces a variety of statistical reports for a specified date range
    namespace: DGJ
