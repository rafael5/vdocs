  ECME:
    name: Electronic Claims Management Engine
    purpose: ​The Electronic Claims Management Engine (ECME) package provides the ability to create and
      distribute electronic Outpatient Pharmacy claims to insurance companies on behalf of VHA Pharmacy
      prescription beneficiaries in a real-time environment. The application does not impact first party
      co-payments and minimizes the impact on legacy pharmacy workflow.
    purpose_long: ​This system meets the Health Insurance Portability and Accountability Act (HIPAA) of
      1996 mandate, specific to the Electronic Transactions and Code Sets rule regarding compliance with
      submitting claims electronically to insurance companies via the National Council for Prescription
      Drug Programs (NCPDP) standard transmission format. ECME receives a billing determination by Integrated
      Billing (IB) if an Outpatient Pharmacy order is billable. If so, ECME builds a NCPDP electronic
      claim transaction using data required by the insurance company for claim adjudication, as defined
      within the company’s individual payer sheet. Claims are submitted during the Outpatient Pharmacy
      finish process, and again during the Outpatient Pharmacy release process if the claim was initially
      rejected. If any additional edits or other events occur to the prescription, such as a return to
      stock, ECME generates additional electronic claims to payers updating them on the prescription billable
      status and updates IB with any claim specific information.
