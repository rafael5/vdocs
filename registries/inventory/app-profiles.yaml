    - Provides automatic transmission of visit data to the Patient Care Encounter (PCE) program in order
      to incorporate QUASAR visit data in Ambulatory Care Reporting Program (ACRP) and in the Decision
      Support System (DSS)
    - Produces a variety of reports useful to local managers, medical center management & central planners
