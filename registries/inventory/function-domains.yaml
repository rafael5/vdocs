# Functional taxonomy for the `function` facet (replaces the Monograph "SPM
# Product Line", which is a VA ownership/portfolio axis, not a "what does it do"
# axis — see docs/function-domain-taxonomy.md). One coherent, mutually-exclusive
# domain per application. `kernel.personas` reads `apps:` as the function_category
# tag baked into gold frontmatter + index.db; `domains:` carries the definitions.
#
# This is curated data (tenet #13): edit an app's domain here and re-run
# `vdocs run --from enrich --to index --force` (enrich bakes function_category into
# gold frontmatter; index reads it from there) — no code change.

domains:
  Clinical care:
    definition: >-
      The clinician's record — orders, notes, problems, consults, reminders,
      allergies, vitals, encounters, and bedside documentation.
  Pharmacy:
    definition: >-
      Medication ordering, dispensing, bar-code administration, and drug data
      management.
  Laboratory:
    definition: >-
      Clinical laboratory, blood bank, point-of-care testing, and lab data
      interfaces.
  Diagnostics & ancillary:
    definition: >-
      Radiology/imaging, surgery, audiology, and other (non-laboratory)
      diagnostic and procedural services.
  Specialty care:
    definition: >-
      Condition- and population-specific clinical programs, registries, and
      specialty services (mental health, oncology, prosthetics, dentistry,
      women's health, …).
  Registration & scheduling:
    definition: >-
      Patient registration, eligibility/enrollment, appointments, and
      primary-care panel management.
  Billing & finance:
    definition: >-
      Revenue, claims, fee/travel pay, fiscal accounting, acquisition, and
      payroll.
  Infrastructure:
    definition: >-
      The VistA platform — Kernel security, FileMan database, messaging
      (HL7/MailMan), interfaces (RPC Broker/VistALink), data exchange, and
      system monitoring.
  Admin & quality:
    definition: >-
      Operations, health-information management (records, release of
      information), quality/safety surveillance, patient advocacy, and
      facilities/logistics.

