# registries/inventory/audiences.yaml — doc_type -> audience facet (LF.2).
# The "differentiate users/usage" roll-up: maps each doc_type code to the audience that reads it,
# so a user can narrow by "I want the technical/clinical/admin docs" instead of naming each doc_type.
# Curated, maintainer-reviewable. Codes mirror registries/inventory/doc-types.yaml.
audiences:
  # clinical / end-user
  UM: clinical        # User Manual
  UG: clinical        # User Guide
  TRG: clinical       # Training Guide
  # technical / developer
  TM: technical       # Technical Manual
  DG: technical       # Developer's Guide
  API: technical      # API Manual
  PDD: technical      # Patch Description Document
  INT: technical      # Interface Specification
  # admin / installer / sysadmin
  IG: admin           # Installation Guide
  IG-IMP: admin       # Implementation Guide
  DIBR: admin         # Deployment, Installation, Back-Out, Rollback
  SM: admin           # Site / Systems Management
  CFG: admin          # Configuration Guide
  SG: admin           # Security Guide
  SG-SET: admin       # Security Setup
  AG: admin           # Administrator's Guide
  SUP: admin          # Supplement
  POM: admin          # Production Operations Manual
  # cross-audience / reference
  RN: any             # Release Notes
  QRG: any            # Quick Reference Guide
  REF: any            # Reference
  FAQ: any            # FAQ
  DESC: any           # Description
  APX: any            # Appendix
  CVG: any            # Coverage / misc
