# registries/entities — curated VistA-domain entity vocabulary → EXTRACT (§8 note, §9.7, D2).
#
# Drives index's generic `entities_pure` recognizer: each entry recognizes one `type` by a regex
# `pattern` or a literal `terms` vocabulary, and `index` writes index.db:entities keyed by the
# `(type, canonical-name)` stable id (§5.5). NO entity patterns live in stage code (tenet #13).
# High-confidence starter set; `discover` proposes corpus-frequency additions through the §9.6 gate.

entities:
  # --- KIDS build / patch ids: NS*ver*num — unambiguous (the '*' triple is VistA-specific) ---
  - type: build
    pattern: '\b[A-Z][A-Z0-9]{1,7}\*\d+(?:\.\d+)?\*\d+\b'
    canonical: whole
    casefold: true
    status: approved
    note: e.g. OR*3.0*539, PSO*7*123 — the retrievable patch identity.

  # --- M globals: caret-prefixed, high precision in technical manuals ---
  - type: global
    pattern: '\^%?[A-Z][A-Z0-9]+\b'
    canonical: whole
    casefold: true
    status: approved
    note: e.g. ^DPT, ^DGPM, ^%ZOSF — leading caret disambiguates from prose.

  # --- FileMan files: require the "file #N" context so bare "#2" page refs don't match ---
  - type: fileman_file
    pattern: '(?i)\bfiles?\s+#?(\d+(?:\.\d+)?)\b'
    canonical: group1
    status: approved
    note: canonical is the file number (e.g. 2, 200, 101) captured from "file #N".

  # --- M routines: a routine call is TAG^ROUTINE / $$FUNC^ROUTINE / DO ^ROUTINE — the label (or
  #     DO command) before the caret distinguishes it from a bare ^GLOBAL data reference. Two forms,
  #     both capturing the routine name after the caret (high precision in technical manuals).
  - type: routine
    pattern: '\b[A-Z%][A-Z0-9]*\^(%?[A-Z][A-Z0-9]{1,7})\b'
    canonical: group1
    casefold: true
    status: approved
    note: e.g. EN^XQOR, $$GET^ORWU → XQOR/ORWU. A bare ^DPT (no leading TAG) stays a global.
  - type: routine
    pattern: '\bDO?\s+\^(%?[A-Z][A-Z0-9]{1,7})\b'
    canonical: group1
    casefold: true
    status: approved
    note: the tagless DO ^ROUTINE form (D ^XUP / DO ^ZTMB).

  # --- HL7 v2 segments: a closed standard vocabulary, matched case-sensitively as whole words ---
  - type: hl7_segment
    terms: [MSH, MSA, EVN, PID, PV1, PV2, NK1, ORC, OBR, OBX, NTE, DG1, AL1, IN1,
            RXA, RXD, RXE, RXO, RXR, SCH, MFE, MFI, QRD]
    case_sensitive: true
    status: approved
    note: standard HL7 v2 segment ids; the closed vocab keeps precision high.

  # --- MailMan mail groups: the distinctive `G.NAME` reference form (file 3.8) ---
  - type: mail_group
    pattern: '\bG\.([A-Z][A-Z0-9.]+)\b'
    canonical: group1
    casefold: true
    status: approved
    note: e.g. G.IRM, G.PSB → IRM/PSB. The `G.` prefix is MailMan-specific.

  # --- RPC / option / protocol: keyword-anchored (like fileman_file) so they match only when the
  #     manual labels them — precise-or-nothing. status:candidate — discover refines the yield. ---
  - type: rpc
    pattern: '\b([A-Z][A-Z0-9]+(?:\s+[A-Z0-9]+){0,4})\s+RPC\b'
    canonical: group1
    casefold: true
    status: candidate
    note: suffix form "ORWPT LIST RPC" → ORWPT LIST.
  - type: option
    pattern: '(?i)\bmenu option\s+([A-Z][A-Z0-9]+(?:\s+[A-Z0-9]+){0,5})\b'
    canonical: group1
    casefold: true
    status: candidate
    note: '"menu option XUMAINT" → XUMAINT (the "menu option" anchor keeps it precise).'
  # NOTE: a bare `protocol NAME` pattern was tried and dropped — on the real corpus it matched any
  # uppercase word after "protocol" (e.g. "protocol FILED"), polluting the graph. Protocols (file
  # 101) need FileMan-context or a curated terms list (a discover follow-up), not a keyword anchor.

  # --- VistA package namespaces: distinctive uppercase codes, matched case-sensitively as whole
  #     words (the ambiguous English homographs OR / PS / IT / IB are deliberately omitted from the
  #     starter set; add them only with disambiguating context if discover shows they're needed).
  - type: package_namespace
    terms:
      - DG     # Registration
      - LR     # Lab
      - PX     # PCE / Clinical Reporting
      - GMRC   # Consults
      - GMTS   # Health Summary
      - PSO    # Outpatient Pharmacy
      - PSB    # Bar Code Med Admin
      - PSJ    # Inpatient Pharmacy
      - RA     # Radiology
      - SD     # Scheduling
      - DGPM   # PIMS Movement
      - YS      # Mental Health
      - GMPL   # Problem List
      - PXRM   # Clinical Reminders
      - TIU     # Text Integration Utilities
      - HL      # HL7
      - XU      # Kernel
      - XM      # MailMan
      - DI      # FileMan (VA FileMan namespace)
    case_sensitive: true
    status: approved
    note: distinctive namespaces; canonical is the namespace itself.
